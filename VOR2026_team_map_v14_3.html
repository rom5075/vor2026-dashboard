.rtitle{font-size:13.5px;font-weight:600}
.rmeta{font-size:12px;color:var(--meta);margin-top:2px}
.rdep{font-size:11.5px;color:var(--dep);margin-top:3px}
.blockhdr{font-size:13px;font-weight:700;margin:14px 0 8px;padding:6px 10px;border-radius:5px;color:#fff}
.pinfo{font-size:13px;color:var(--meta);margin-bottom:10px}

const BC={'B1':'var(--b1)','B2':'var(--b2)','B3':'var(--b3)','B4':'var(--b4)','B5':'var(--b5)'};
const BSHORT={'B1':'Доработка 1','B2':'Доработка 2','B3':'Доработка 3','B4':'Доработка 4','B5':'Доработка 5'};
const PEOPLE_ORDER=['SQL Developer 1','SQL Developer 2','Backend Developer','Frontend Developer','Systems Engineer','Analyst 1','Analyst 2'];
const D0=new Date('2026-07-01'), D1=new Date('2026-12-15');
const SPAN=D1-D0;
function pct(d){return Math.max(0,Math.min(100,((new Date(d)-D0)/SPAN)*100));}
function fmt(d){const x=new Date(d);return String(x.getDate()).padStart(2,'0')+'.'+String(x.getMonth()+1).padStart(2,'0');}
function fmtY(d){const x=new Date(d);return fmt(d)+'.'+x.getFullYear();}

const tabs=document.getElementById('tabs'), panels=document.getElementById('panels');
function addTab(id,label){
  const t=document.createElement('div');t.className='tab';t.textContent=label;t.dataset.id=id;
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');document.getElementById(id).classList.add('active');};
  tabs.appendChild(t);return t;
}
function addPanel(id){const p=document.createElement('div');p.className='panel';p.id=id;panels.appendChild(p);return p;}

// ============ TAB 1: OVERVIEW ============
addTab('ov','Общая картина').classList.add('active');
const ov=addPanel('ov');ov.classList.add('active');

// legend + who-works-on-what table
let lg='<div class="card"><b style="font-size:14px">Кто на каких доработках задействован</b>'+
  '<div class="legend">';
for(const b of ['B1','B2','B3','B4','B5'])
  lg+='<span class="legchip"><span class="sw" style="background:'+BC[b]+'"></span>'+DATA.block_name[b]+'</span>';
lg+='</div><table class="who"><tr><th style="width:260px">Сотрудник</th><th>Доработки</th><th style="width:110px">Задач</th></tr>';
for(const k of PEOPLE_ORDER){
  const p=DATA.people[k];
  let chips='';
  for(const b of p.blocks) chips+='<span class="chip" style="background:'+BC[b]+'">'+BSHORT[b]+'</span>';
  lg+='<tr><td><b>'+p.fio+'</b><br><span style="color:#666;font-size:12px">'+p.role+'</span></td><td>'+chips+'</td><td>'+p.tasks.length+'</td></tr>';
}
lg+='</table></div>';
ov.innerHTML=lg;

// gantt swimlanes
let g='<div class="card"><b style="font-size:14px">Календарная карта: июль — декабрь 2026</b><div class="gantt"><div class="gwrap">';
g+='<div class="months">';
const months=[['2026-07-01','Июль'],['2026-08-01','Август'],['2026-09-01','Сентябрь'],['2026-10-01','Октябрь'],['2026-11-01','Ноябрь'],['2026-12-01','Декабрь']];
for(let i=0;i<months.length;i++){
  const st=pct(months[i][0]); const en=i+1<months.length?pct(months[i+1][0]):100;
  g+='<div class="mcell" style="width:'+(en-st)+'%">'+months[i][1]+'</div>';
}
g+='</div>';
for(const k of PEOPLE_ORDER){
  const p=DATA.people[k];
  g+='<div class="grow"><div class="gname">'+p.fio+'</div><div class="gtrack">';
  for(const t of p.tasks){
    const l=pct(t.start), r=pct(t.finish)+ (100/168); // ~ +1 день ширины
    g+='<div class="gbar" style="left:'+l+'%;width:'+Math.max(0.7,r-l)+'%;background:'+BC[t.block]+'" '+
       'data-tip="<b>'+t.block+' · '+t.name.replace(/"/g,'&quot;')+'</b><br>'+fmtY(t.start)+' — '+fmtY(t.finish)+' · '+t.work+' ч">'+t.block+'</div>';
  }
  g+='</div></div>';
}
// линия текущей даты (сегодня)
const _now=new Date();
const todayStr=_now.getFullYear()+'-'+String(_now.getMonth()+1).padStart(2,'0')+'-'+String(_now.getDate()).padStart(2,'0');
const todayP=pct(todayStr);
if(todayP>0&&todayP<100){
  const left='calc(180px + (100% - 180px) * '+todayP+'/100)';
  g+='<div class="today-line" style="left:'+left+'" title="Сегодня"><span>Сегодня '+fmt(todayStr)+'</span></div>';
}
g+='</div></div>';
g+='<div style="font-size:11.5px;color:var(--muted);margin-top:6px">Красная вертикальная линия = сегодня. Цвет плитки = доработка. Наведи курсор — детали задачи. Дедлайны: Д4/Д5 — 30.09, Д1 — 31.10, Д2 — 28.02.27, Д3 — 31.03.27 (часть за пределами карты, план завершается раньше).</div></div>';
ov.innerHTML+=g;

// ============ PERSON TABS ============
for(const k of PEOPLE_ORDER){
  const p=DATA.people[k];
  const id='p_'+k.replace(/\s/g,'_');
  addTab(id,p.fio.split(' ')[0]+(p.fio.split(' ')[1]?' '+p.fio.split(' ')[1][0]+'.':''));
  const pan=addPanel(id);
  let h='<div class="card"><b style="font-size:16px">'+p.fio+'</b> · <span style="color:#666">'+p.role+'</span>';
  h+='<div class="pinfo" style="margin-top:6px">Доработки: ';
  for(const b of p.blocks) h+='<span class="chip" style="background:'+BC[b]+'">'+BSHORT[b]+'</span>';
  h+=' · всего задач: '+p.tasks.length+'</div>';
  // route grouped by block in execution order
  let lastBlock=null, num=0;
  h+='<ol class="route">';
  for(const t of p.tasks){
    if(t.block!==lastBlock){
      h+='</ol><div class="blockhdr" style="background:'+BC[t.block]+'">'+DATA.block_name[t.block]+'</div><ol class="route">';
      lastBlock=t.block;
    }
    num++;
    let dep='';
    if(t.ext.length){
      dep='<div class="rdep">⚠ ждёт: '+t.ext.map(e=>'задачу '+e.wbs+' ('+e.who+')').join(', ')+'</div>';
    }
    h+='<li><div class="rnum" style="background:'+BC[t.block]+'">'+num+'</div>'+
       '<div class="rbody" style="border-left-color:'+BC[t.block]+'">'+
       '<div class="rtitle">'+t.name+'</div>'+
       '<div class="rmeta">'+fmtY(t.start)+' — '+fmtY(t.finish)+' · '+t.work+' ч · WBS '+t.wbs+'</div>'+dep+'</div></li>';
  }
  h+='</ol></div>';
  pan.innerHTML=h;
}

// theme toggle
const themeBtn=document.getElementById('themeBtn');
function applyTheme(t){
  if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');themeBtn.textContent='☀️ Светлая тема';}
  else{document.documentElement.removeAttribute('data-theme');themeBtn.textContent='🌙 Тёмная тема';}
  try{localStorage.setItem('vor_theme',t);}catch(e){}
}
themeBtn.onclick=()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
let saved=null;
try{saved=localStorage.getItem('vor_theme');}catch(e){}
if(saved) applyTheme(saved);
else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');

// tooltip
const tip=document.getElementById('tip');
document.addEventListener('mouseover',e=>{
  const b=e.target.closest('.gbar');
  if(b){tip.innerHTML=b.dataset.tip;tip.style.display='block';}
  else tip.style.display='none';
});
document.addEventListener('mousemove',e=>{
  tip.style.left=Math.min(window.innerWidth-400,e.clientX+14)+'px';
  tip.style.top=(e.clientY+16)+'px';
});
</script>
