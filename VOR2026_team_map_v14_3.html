<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VOR 2026 — карта работ команды (план v14 (07.07))</title>

<link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
<meta name="theme-color" content="#2F5496">
<style>
:root{
  --b1:#4472C4;--b2:#548235;--b3:#BF8F00;--b4:#C55A11;--b5:#7F7F7F;
  --bg:#F5F6FA;--text:#222;--card:#fff;--muted:#666;--meta:#555;
  --border:#ddd;--border2:#e2e2e2;--track:#FAFAFC;--tabbg:#fff;--tabborder:#ccc;
  --accent:#2F5496;--dep:#B34700;--tipbg:#222;--tiptext:#fff;--hover:#222;
  --arrow:#6B7280;--ok:#2E7D32;--warn:#E65100;--late:#C62828;
  --gnamew:180px;color-scheme:light;
}
[data-theme="dark"]{
  --b1:#5B8DEF;--b2:#6FA85A;--b3:#D4A72C;--b4:#E07B39;--b5:#9AA0A6;
  --bg:#15171C;--text:#E8EAED;--card:#1F232B;--muted:#9AA0A6;--meta:#B7BCC4;
  --border:#3A3F47;--border2:#3A3F47;--track:#262B33;--tabbg:#1F232B;--tabborder:#3A3F47;
  --accent:#5B8DEF;--dep:#F0A05A;--tipbg:#E8EAED;--tiptext:#15171C;--hover:#fff;
  --arrow:#9AA0A6;--ok:#81C784;--warn:#FFB74D;--late:#EF9A9A;
  color-scheme:dark;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);padding:18px;transition:background .2s,color .2s}
h1{font-size:21px;margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.tabs-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.tabs-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tabs-label{font-size:12px;font-weight:700;color:var(--muted);margin-right:4px;white-space:nowrap;text-transform:uppercase;letter-spacing:.02em}
.tab{padding:7px 14px;border-radius:6px;background:var(--tabbg);border:1px solid var(--tabborder);cursor:pointer;font-size:13px;user-select:none;color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab.btab{border-left:4px solid #999}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--card);border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.card h2{font-size:15px;margin-bottom:10px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 4px;align-items:center}
.legchip{display:flex;align-items:center;gap:6px;font-size:12px}
.legchip .sw{width:14px;height:14px;border-radius:3px;display:inline-block}
table.who{border-collapse:collapse;width:100%;font-size:13px}
table.who th,table.who td{border:1px solid var(--border);padding:7px 10px;text-align:left;vertical-align:top}
table.who th{background:var(--accent);color:#fff}
.chip{display:inline-block;padding:2px 9px;border-radius:10px;color:#fff;font-size:11.5px;font-weight:600;margin:1px 3px 1px 0}
.gantt{position:relative;overflow-x:auto}
.gwrap{position:relative;min-width:1500px}
.grow{display:flex;align-items:center;height:34px;position:relative}
.gname{width:var(--gnamew);min-width:var(--gnamew);font-size:12.5px;font-weight:600;padding-right:8px;line-height:1.25;position:sticky;left:0;z-index:9;background:var(--card);align-self:stretch;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--border)}
.gname small{display:block;font-weight:500;color:var(--muted);font-size:10.5px}
.gtrack{position:relative;flex:1;height:26px;background:var(--track);border-radius:4px}
.gbar{position:absolute;height:22px;top:2px;border-radius:4px;font-size:10px;color:#fff;overflow:hidden;white-space:nowrap;padding:4px 4px 0;cursor:default;z-index:2}
.gbar:hover{outline:2px solid var(--hover);z-index:5}
.months{display:flex;font-size:11px;color:var(--meta);border-bottom:1px solid var(--border);margin-bottom:6px}
.months .mspacer{position:sticky;left:0;z-index:9;min-width:var(--gnamew);background:var(--card)}
.mcells{display:flex;flex:1;min-width:0}
.mcell{border-left:1px solid var(--border);padding:2px 4px}
.vline{position:absolute;top:22px;bottom:0;width:0;z-index:8;pointer-events:none}
.vline.today{border-left:2px solid #E53935;opacity:.95}
.vline.dl{border-left:2px dashed;opacity:.95}
.vline.proj{border-left:2px solid;opacity:.95}
.vline span{position:absolute;top:0;left:4px;font-size:10px;white-space:nowrap;font-weight:700;background:var(--card);padding:1px 6px;border-radius:3px;box-shadow:0 0 0 1px var(--border);max-width:160px;overflow:hidden;text-overflow:ellipsis}
.vline.today span{color:#E53935;box-shadow:0 0 0 1px rgba(229,57,53,.35)}
.vline.today::before{content:'';position:absolute;top:-3px;left:-4px;width:6px;height:6px;border-radius:50%;background:#E53935}
.vline.dl::before,.vline.proj::before{content:'';position:absolute;top:-2px;left:-4px;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid currentColor}
.dl-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin:8px 0 4px;font-size:11.5px;color:var(--meta)}
.dl-legend .sw{width:12px;height:0;border-top:2px dashed;display:inline-block;vertical-align:middle;margin-right:5px}
.route{list-style:none}
.route li{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.rnum{min-width:26px;height:26px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:2px}
.rbody{background:var(--card);border:1px solid var(--border2);border-left:5px solid #999;border-radius:6px;padding:8px 12px;flex:1}
.rtitle{font-size:13.5px;font-weight:600}
.rmeta{font-size:12px;color:var(--meta);margin-top:2px}
.rdep{font-size:11.5px;color:var(--dep);margin-top:3px}
.blockhdr{font-size:13px;font-weight:700;margin:14px 0 8px;padding:6px 10px;border-radius:5px;color:#fff}
.pinfo{font-size:13px;color:var(--meta);margin-bottom:10px}
.tip{position:fixed;display:none;background:var(--tipbg);color:var(--tiptext);padding:8px 10px;border-radius:6px;font-size:12px;max-width:min(400px,calc(100vw - 20px));z-index:99;pointer-events:none;line-height:1.35}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.kpi .box{background:var(--track);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.kpi .n{font-size:22px;font-weight:700;line-height:1.1}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:3px}
.cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.taskrow{border:1px solid var(--border2);border-left:4px solid #999;border-radius:6px;padding:8px 10px;margin-bottom:7px;background:var(--card);display:flex;gap:8px;align-items:flex-start}
.taskrow .taskrow-body{flex:1;min-width:0}
.taskrow .t{font-size:13px;font-weight:600}
.taskrow .m{font-size:11.5px;color:var(--meta);margin-top:2px}
.taskrow.late{border-left-color:var(--late)}
.taskrow.active{border-left-color:var(--ok)}
.taskrow.soon{border-left-color:var(--warn)}
.taskrow.hidden-item{opacity:.55;background:var(--track)}
.taskrow .hide-cb,.handoff .hide-cb{margin-top:2px;width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)}
.handoff{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:7px;font-size:12.5px;background:var(--track)}
.handoff .arr{color:var(--dep);font-weight:700;font-size:16px}
.handoff .who{font-weight:600}
.handoff.hidden-item{opacity:.55}
.muted{color:var(--muted);font-size:12px}
.note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.4}
.toggle-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:6px 0 10px;font-size:12.5px}
.toggle-row label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.btn-link{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text);background:var(--tabbg)}
.btn-link:hover{border-color:var(--accent);color:var(--accent)}
.btn-link.danger:hover{border-color:var(--late);color:var(--late)}
.now-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 4px}
.now-toolbar .hint{font-size:11.5px;color:var(--muted);flex:1;min-width:180px}
.dep-list{font-size:12.5px}
.dep-list li{margin:4px 0 4px 18px}
.section-title{font-size:14px;font-weight:700;margin:4px 0 8px}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.who th.cw-role{width:260px}
table.who th.cw-n{width:90px}
/* ---- мобильная верстка (iPhone и др.) ---- */
@media (max-width:640px){
  :root{--gnamew:132px}
  body{padding:10px}
  h1{font-size:17px}
  .sub{font-size:12px;margin-bottom:10px}
  .card{padding:12px 10px;margin-bottom:10px}
  .tabs-wrap{gap:6px;margin-bottom:10px}
  .tabs-row{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding:2px 0}
  .tabs-row::-webkit-scrollbar{display:none}
  .tabs-label{position:sticky;left:0;z-index:2;background:var(--bg);align-self:stretch;display:flex;align-items:center;padding-right:8px;margin-right:0}
  .tab{padding:9px 13px;flex:0 0 auto;white-space:nowrap}
  .kpi{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi .n{font-size:19px}
  .gwrap{min-width:1150px}
  .gname{font-size:11.5px}
  .gname small{font-size:9.5px}
  table.who{min-width:520px;font-size:12px}
  table.who th,table.who td{padding:6px 8px}
  table.who th.cw-role{width:170px}
  table.who th.cw-n{width:56px}
  .vline span{max-width:130px}
  .now-toolbar .hint{flex-basis:100%}
  .btn-link{padding:8px 12px}
  .taskrow .hide-cb,.handoff .hide-cb{width:19px;height:19px}
  .handoff{font-size:12px}
  .rnum{min-width:24px;height:24px;font-size:11px}
  .rbody{padding:7px 10px}
  .route li{gap:8px}
  .legend{gap:8px}
  .dl-legend{font-size:11px;gap:6px 10px}
}
</style>
</head>

function parseD(s){
  if (s instanceof Date) return s;
  const p = String(s).slice(0,10).split('-').map(Number);
  return new Date(p[0], p[1]-1, p[2]);
}
function pct(d){
  return Math.max(0, Math.min(100, ((parseD(d)-D0)/SPAN)*100));
}
function fmt(d){
  const x = parseD(d);
  return String(x.getDate()).padStart(2,'0')+'.'+String(x.getMonth()+1).padStart(2,'0');
}
function fmtY(d){
  const x = parseD(d);
  return fmt(d)+'.'+x.getFullYear();
}
function todayLocal(){
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}
function isoLocal(d){
  const x = parseD(d);
  return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}

// ---- gantt builder ----
const MONTHS = [
  ['2026-07-01','Июль'],['2026-08-01','Август'],['2026-09-01','Сентябрь'],
  ['2026-10-01','Октябрь'],['2026-11-01','Ноябрь'],['2026-12-01','Декабрь']
];

function monthsHeaderHtml(){
  let h = '<div class="months"><div class="mspacer"></div><div class="mcells">';
  for (let i=0;i<MONTHS.length;i++){
    const st = pct(MONTHS[i][0]);
    const en = i+1<MONTHS.length ? pct(MONTHS[i+1][0]) : 100;
    h += '<div class="mcell" style="width:'+(en-st)+'%">'+MONTHS[i][1]+'</div>';
  }
  return h+'</div></div>';
}

function vlineHtml(kind, dateStr, label, color, labelTopPx){
  const p = pct(dateStr);
  // allow near-edges; only skip truly outside the chart span
  if (p < 0 || p > 100) return '';
  const pClamped = Math.max(0.15, Math.min(99.85, p));
  // align with .gname (--gnamew) + track — use % of full wrap via calc with unit-safe form
  const left = 'calc(var(--gnamew) + (100% - var(--gnamew)) * '+(pClamped/100).toFixed(6)+')';
  const col = color || (kind==='today' ? '#E53935' : '#C00');
  let cls = 'vline dl';
  if (kind==='today') cls = 'vline today';
  else if (kind==='proj') cls = 'vline proj';
  const topOff = (labelTopPx!=null) ? 'top:'+labelTopPx+'px;' : '';
  return '<div class="'+cls+'" style="left:'+left+';'+(kind==='today'?'':';border-left-color:'+col+';color:'+col)+
    '" title="'+esc(label)+'"><span style="color:'+col+';'+topOff+'">'+esc(label)+'</span></div>';
}

function deadlinesInRangeHtml(blocksFilter, opts={}){
  let h = '';
  const list = blocksFilter || BLOCKS;
  // group same-date deadlines so labels don't fully hide each other
  const byDate = {};
  for (const b of list){
    const d = DATA.deadlines[b];
    if (!d) continue;
    const p = pct(d);
    if (p < 0 || p > 100) continue;
    (byDate[d] = byDate[d] || []).push(b);
  }
  const dates = Object.keys(byDate).sort();
  dates.forEach((d, di) => {
    const blocks = byDate[d];
    const label = blocks.map(b => BSHORT[b].replace('Доработка ','Д')+' · '+fmtY(d)).join(' · ');
    const col = blocks.length===1 ? BHEX[blocks[0]] : '#5D4037';
    // slight vertical stagger when multiple distinct dates so labels don't collide
    h += vlineHtml('dl', d, label, col, 2 + (di % 4) * 13);
  });
  if (opts.projectFinish){
    const pf = opts.projectFinish;
    const p = pct(pf);
    if (p >= 0 && p <= 100){
      h += vlineHtml('proj', pf, 'Финиш плана · '+fmtY(pf), '#6A1B9A', 2);
    }
  }
  return h;
}

function deadlineLegendHtml(blocksFilter, opts={}){
  const list = blocksFilter || BLOCKS;
  let h = '<div class="dl-legend">';
  h += '<span><span class="sw" style="border-top-color:#E53935;border-top-style:solid"></span>Сегодня</span>';
  for (const b of list){
    const d = DATA.deadlines[b];
    if (!d) continue;
    const p = pct(d);
    const onChart = p >= 0 && p <= 100;
    h += '<span title="'+(onChart?'линия на гантте':'вне горизонта гантта')+'">'+
      '<span class="sw" style="border-top-color:'+BHEX[b]+'"></span>'+
      '<b>'+BSHORT[b]+'</b>: '+fmtY(d)+(onChart?'':' (вне карты)')+'</span>';
  }
  if (opts.projectFinish){
    h += '<span><span class="sw" style="border-top-color:#6A1B9A;border-top-style:solid"></span>Финиш плана: '+fmtY(opts.projectFinish)+'</span>';
  }
  h += '</div>';
  return h;
}

function todayLineHtml(){
  const t = todayLocal();
  if (t < D0 || t > D1) return '';
  return vlineHtml('today', isoLocal(t), 'Сегодня '+fmt(t));
}

// автоскролл видимых ганттов к линии «сегодня» (актуально на телефоне, где чарт шире экрана)
function scrollGanttsToToday(scope){
  (scope || document).querySelectorAll('.gantt').forEach(g => {
    if (g.dataset.scrolled || !g.clientWidth || g.scrollWidth <= g.clientWidth + 4) return;
    const wrap = g.querySelector('.gwrap');
    if (!wrap) return;
    const p = pct(todayLocal());
    if (p <= 0 || p >= 100) return;
    const gn = g.querySelector('.gname');
    const nameW = gn ? gn.offsetWidth : 180;
    const x = nameW + (wrap.clientWidth - nameW) * p / 100;
    g.scrollLeft = Math.max(0, x - nameW - (g.clientWidth - nameW) * 0.35);
    g.dataset.scrolled = '1';
  });
}

/**
 * rows: [{key, label, sub, tasks:[]}]
 * opts: {deadlines:bool|array of blocks, projectFinish:string, id, barLabel}
 * Стрелки зависимостей на гантте отключены (перегружали визуал).
 */
function buildGantt(rows, opts={}){
  const wrapId = opts.id || ('g'+Math.random().toString(36).slice(2,8));
  let html = '<div class="gantt"><div class="gwrap" id="'+wrapId+'">';
  html += monthsHeaderHtml();

  rows.forEach((row, ri) => {
    html += '<div class="grow" data-row="'+ri+'"><div class="gname">'+row.label+
      (row.sub ? '<small>'+esc(row.sub)+'</small>' : '')+'</div><div class="gtrack">';
    for (const t of row.tasks){
      const l = pct(t.start);
      const r = pct(t.finish) + (100/168);
      const w = Math.max(0.7, r-l);
      html += '<div class="gbar" data-wbs="'+esc(t.wbs)+'" style="left:'+l+'%;width:'+w+'%;background:'+BC[t.block]+'" data-tip="'+taskTip(t).replace(/"/g,'&quot;')+'">'+
        (opts.barLabel==='wbs' ? t.wbs : t.block)+'</div>';
    }
    html += '</div></div>';
  });

  html += todayLineHtml();
  if (opts.deadlines){
    const bl = opts.deadlines === true ? BLOCKS : opts.deadlines;
    html += deadlinesInRangeHtml(bl, {projectFinish: opts.projectFinish});
  } else if (opts.projectFinish){
    html += deadlinesInRangeHtml([], {projectFinish: opts.projectFinish});
  }

  html += '</div></div>';
  return html;
}

  g += '<div id="ovGantt">'+buildGantt(rows,{deadlines:true, projectFinish:PROJECT_FINISH, id:'ovGwrap', barLabel:'block'})+'</div>';
  g += '<div class="note">Красная сплошная — сегодня. Цветные пунктиры — <b>дедлайн доработки</b> (= finish последней задачи блока): '+
    BLOCKS.map(b=>'Д'+b.slice(1)+' '+fmtY(DATA.deadlines[b])).join(', ')+
    '. Фиолетовая сплошная — финиш плана '+fmtY(PROJECT_FINISH)+'. Зависимости — в списках на вкладках доработок.</div></div>';
  ov.innerHTML = lg + g;
})();

// ---- NOW / THIS WEEK ----
addTab('now','Сейчас / эта неделя');
const nowPan = addPanel('now');

// ---- localStorage: скрытые пункты вкладки «Сейчас» (личный UI, не статус плана) ----
const NOW_HIDE_KEY = 'vor2026_now_hidden_v1';
const NOW_SHOW_HIDDEN_KEY = 'vor2026_now_show_hidden_v1';
function loadNowHidden(){
  try{
    const raw = localStorage.getItem(NOW_HIDE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(arr) ? arr : []);
  }catch(e){ return new Set(); }
}
function saveNowHidden(set){
  try{ localStorage.setItem(NOW_HIDE_KEY, JSON.stringify([...set])); }catch(e){}
}
function loadShowHidden(){
  try{ return localStorage.getItem(NOW_SHOW_HIDDEN_KEY) === '1'; }catch(e){ return false; }
}
function saveShowHidden(v){
  try{ localStorage.setItem(NOW_SHOW_HIDDEN_KEY, v ? '1' : '0'); }catch(e){}
}

function renderNowTab(){
  const today = todayLocal();
  const weekEnd = new Date(today.getTime() + 7*DAY);
  const weekStart = today;
  const hidden = loadNowHidden();
  const showHidden = loadShowHidden();

  function isAnalystTask(t){
    const role = t._role || '';
    if (role === 'Analyst 1' || role === 'Analyst 2') return true;
    const res = t.res || [];
    return res.some(r => r && String(r).indexOf('Analyst') === 0);
  }
  function overlapsWeek(t){
    const s = parseD(t.start), f = parseD(t.finish);
    return s <= weekEnd && f >= weekStart;
  }
  function activeToday(t){
    const s = parseD(t.start), f = parseD(t.finish);
    return s <= today && f >= today;
  }
  function startsThisWeek(t){
    const s = parseD(t.start);
    return s >= weekStart && s <= weekEnd;
  }
  function latePlan(t){
    return parseD(t.finish) < today;
  }
  function taskKey(t){ return 't:'+t.wbs; }
  function handoffKey(from, to){ return 'h:'+from.wbs+'>'+to.wbs; }

  const teamTasks = DATA.tasks.filter(t => !isAnalystTask(t));
  const activeAll = teamTasks.filter(activeToday).sort((a,b)=>parseD(a.start)-parseD(b.start));
  const startingAll = teamTasks.filter(t => startsThisWeek(t) && !activeToday(t)).sort((a,b)=>parseD(a.start)-parseD(b.start));
  const lateAll = teamTasks.filter(latePlan).sort((a,b)=>parseD(b.finish)-parseD(a.finish));

  const handoffs = [];
  for (const t of teamTasks){
    for (const pred of (t.preds||[])){
      const from = byWbs[pred[0]];
      if (!from || isAnalystTask(from)) continue;
      if (!isCrossPerson(from, t)) continue;
      const pf = parseD(from.finish);
      const ts = parseD(t.start);
      const near = Math.abs(pf - today) <= 14*DAY || (ts >= weekStart && ts <= weekEnd) || overlapsWeek(t) || overlapsWeek(from);
      if (near) handoffs.push({from, to:t});
    }
  }
  const seen = new Set();
  const handoffsAll = handoffs.filter(h => {
    const k = h.from.wbs+'>'+h.to.wbs;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  }).sort((a,b)=>parseD(a.from.finish)-parseD(b.from.finish));

  function visibleTasks(list){
    return list.filter(t => {
      const hid = hidden.has(taskKey(t));
      return showHidden ? true : !hid;
    });
  }
  function visibleHandoffs(list){
    return list.filter(h => {
      const hid = hidden.has(handoffKey(h.from, h.to));
      return showHidden ? true : !hid;
    });
  }

  const active = visibleTasks(activeAll);
  const starting = visibleTasks(startingAll);
  const late = visibleTasks(lateAll);
  const handoffsU = visibleHandoffs(handoffsAll);
  const hiddenCount = hidden.size;

  function taskCard(t, cls){
    const key = taskKey(t);
    const isHid = hidden.has(key);
    let dep = '';
    if (t.preds && t.preds.length){
      dep = '<div class="rdep">⬅ блокируют: '+t.preds.map(p=>{
        const pr = byWbs[p[0]];
        return (pr?pr.wbs:'?')+' · '+(pr?pr._fio:'?');
      }).join('; ')+'</div>';
    }
    const suc = successors(t.wbs).filter(s => isCrossPerson(t,s));
    let blocks = '';
    if (suc.length){
      blocks = '<div class="rdep">➡ блокирует: '+suc.map(s=>s.wbs+' · '+s._fio).join('; ')+'</div>';
    }
    return '<div class="taskrow '+cls+(isHid?' hidden-item':'')+'" style="border-left-color:'+(cls==='late'?'var(--late)':cls==='active'?'var(--ok)':BHEX[t.block])+
      '" data-hide-key="'+esc(key)+'">'+
      '<input type="checkbox" class="hide-cb" title="'+(isHid?'Вернуть в список':'Скрыть с глаз (localStorage)')+'" '+(isHid?'checked ':'')+'aria-label="Скрыть задачу">' +
      '<div class="taskrow-body"><div class="t"><span class="chip" style="background:'+BC[t.block]+'">'+t.block+'</span> '+esc(t.name)+
      (isHid?' <span class="muted">· скрыто</span>':'')+
      '</div><div class="m">'+esc(t._fio)+' · '+fmtY(t.start)+' — '+fmtY(t.finish)+' · '+t.work+' ч · WBS '+t.wbs+'</div>'+dep+blocks+'</div></div>';
  }

  function handoffCard(h){
    const key = handoffKey(h.from, h.to);
    const isHid = hidden.has(key);
    const {from,to} = h;
    return '<div class="handoff'+(isHid?' hidden-item':'')+'" data-hide-key="'+esc(key)+'">'+
      '<input type="checkbox" class="hide-cb" title="'+(isHid?'Вернуть':'Скрыть handoff')+'" '+(isHid?'checked ':'')+'aria-label="Скрыть handoff">'+
      '<span class="chip" style="background:'+BC[from.block]+'">'+from.block+'</span>'+
      '<span class="who">'+esc(from._fio)+'</span>'+
      '<span class="muted">'+from.wbs+' · до '+fmtY(from.finish)+'</span>'+
      '<span class="arr">затем</span>'+
      '<span class="chip" style="background:'+BC[to.block]+'">'+to.block+'</span>'+
      '<span class="who">'+esc(to._fio)+'</span>'+
      '<span class="muted">'+to.wbs+' · с '+fmtY(to.start)+'</span>'+
      (isHid?'<span class="muted">· скрыто</span>':'')+
      '</div>';
  }

  let html = '<div class="card"><h2>Сейчас / эта неделя · '+fmtY(today)+'</h2>';
  html += '<div class="kpi">';
  html += '<div class="box"><div class="n">'+active.length+(active.length!==activeAll.length?'<span class="muted" style="font-size:14px">/'+activeAll.length+'</span>':'')+'</div><div class="l">В плане на сегодня</div></div>';
  html += '<div class="box"><div class="n">'+starting.length+(starting.length!==startingAll.length?'<span class="muted" style="font-size:14px">/'+startingAll.length+'</span>':'')+'</div><div class="l">Стартуют на неделе</div></div>';
  html += '<div class="box"><div class="n">'+late.length+(late.length!==lateAll.length?'<span class="muted" style="font-size:14px">/'+lateAll.length+'</span>':'')+'</div><div class="l">План finish &lt; сегодня</div></div>';
  html += '<div class="box"><div class="n">'+handoffsU.length+(handoffsU.length!==handoffsAll.length?'<span class="muted" style="font-size:14px">/'+handoffsAll.length+'</span>':'')+'</div><div class="l">Handoff (±2 нед.)</div></div>';
  html += '<div class="box"><div class="n">'+hiddenCount+'</div><div class="l">Скрыто (localStorage)</div></div>';
  html += '</div>';
  html += '<div class="now-toolbar">';
  html += '<label><input type="checkbox" id="nowShowHidden"'+(showHidden?' checked':'')+'> Показать скрытые</label>';
  html += '<button type="button" class="btn-link danger" id="nowClearHidden"'+(hiddenCount?'':' disabled')+'>Сбросить все галочки ('+hiddenCount+')</button>';
  html += '<span class="hint">Галочка = «убрать с глаз» на этом браузере/ПК.</span>';
  html += '</div>';
  html += '</div>';

  html += '<div class="cols">';
  html += '<div class="card"><div class="section-title" style="color:var(--ok)">▶ В работе (по плану сегодня)</div>';
  html += active.length ? active.map(t=>taskCard(t,'active')).join('') : '<div class="muted">'+(activeAll.length?'Все скрыты галочками.':'Нет задач с датами, покрывающими сегодня.')+'</div>';
  html += '</div>';

  html += '<div class="card"><div class="section-title" style="color:var(--warn)">⏭ Стартуют на этой неделе</div>';
  html += starting.length ? starting.map(t=>taskCard(t,'soon')).join('') : '<div class="muted">'+(startingAll.length?'Все скрыты галочками.':'Нет новых стартов на 7 дней.')+'</div>';
  html += '</div>';

  html += '<div class="card"><div class="section-title" style="color:var(--late)">⏰ План finish уже прошёл</div>';
  html += late.length ? late.map(t=>taskCard(t,'late')).join('') : '<div class="muted">'+(lateAll.length?'Все скрыты галочками.':'Нет «просроченных» по плану.')+'</div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="card"><div class="section-title">↔ Передачи между людьми (что кого блокирует)</div>';
  if (!handoffsU.length) html += '<div class="muted">'+(handoffsAll.length?'Все handoff скрыты.':'Нет близких handoff.')+'</div>';
  else html += handoffsU.map(handoffCard).join('');
  html += '<div class="note">Связка: A завершает → B не стартует, пока не отдадут результат. Галочка слева скрывает строку.</div></div>';

  nowPan.innerHTML = html;

  nowPan.querySelectorAll('.hide-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      const row = cb.closest('[data-hide-key]');
      if (!row) return;
      const key = row.getAttribute('data-hide-key');
      const set = loadNowHidden();
      if (cb.checked) set.add(key); else set.delete(key);
      saveNowHidden(set);
      renderNowTab();
    });
  });
  const showCb = document.getElementById('nowShowHidden');
  if (showCb){
    showCb.addEventListener('change', () => {
      saveShowHidden(showCb.checked);
      renderNowTab();
    });
  }
  const clearBtn = document.getElementById('nowClearHidden');
  if (clearBtn){
    clearBtn.addEventListener('click', () => {
      if (!loadNowHidden().size) return;
      if (!confirm('Сбросить все скрытия на вкладке «Сейчас»?')) return;
      saveNowHidden(new Set());
      renderNowTab();
    });
  }
}
renderNowTab();

// ---- BLOCK TABS ----
for (const b of BLOCKS){
  const id = 'blk_'+b;
  const tab = addTab(id, BSHORT[b], {block:true, color:BHEX[b]});
  const pan = addPanel(id);
  const tasks = DATA.tasks.filter(t => t.block===b).sort((a,c)=>parseD(a.start)-parseD(c.start) || a.wbs.localeCompare(c.wbs));
  const peopleIn = PEOPLE_ORDER.filter(k => tasks.some(t => t._role===k));
  const hours = tasks.reduce((s,t)=>s+t.work,0);
  const last = tasks.reduce((m,t)=> parseD(t.finish)>parseD(m)?t.finish:m, tasks[0]?tasks[0].finish:'2026-07-01');
  const dl = DATA.deadlines[b] || last; // = finish последней задачи

  // rows by person for this block
  const rows = peopleIn.map(k => {
    const p = DATA.people[k];
    return {key:k, label:esc(p.fio), sub:p.role, tasks: tasks.filter(t => t._role===k)};
  });
  // unassigned
  const ua = tasks.filter(t => !t._role);
  if (ua.length) rows.push({key:'_ua', label:'Не назначено', sub:'UAT bug fixes и др.', tasks:ua});

  let h = '<div class="card">';
  h += '<h2 style="color:'+BHEX[b]+'">'+esc(DATA.block_name[b])+'</h2>';
  h += '<div class="kpi">';
  h += '<div class="box"><div class="n">'+tasks.length+'</div><div class="l">Задач</div></div>';
  h += '<div class="box"><div class="n">'+hours+'</div><div class="l">Часов (plan)</div></div>';
  h += '<div class="box"><div class="n">'+peopleIn.length+'</div><div class="l">Участников</div></div>';
  h += '<div class="box"><div class="n">'+fmtY(dl)+'</div><div class="l">Дедлайн (= последняя задача)</div></div>';
  h += '</div>';
  h += '<div class="note">Дедлайн доработки: <b style="color:'+BHEX[b]+'">'+fmtY(dl)+'</b> — finish последней задачи блока, пунктир на гантте.</div>';
  h += '</div>';

  h += '<div class="card"><h2>Гантт по доработке</h2>';
  h += deadlineLegendHtml([b]);
  h += '<div id="gantt_'+b+'">'+buildGantt(rows,{deadlines:[b], id:'gw_'+b, barLabel:'wbs'})+'</div>';
  h += '<div class="note">Пунктир цвета доработки — дедлайн (finish последней задачи). Зависимости — списком ниже.</div></div>';

  // dependency list
  const edges = [];
  for (const t of tasks){
    for (const pred of (t.preds||[])){
      const from = byWbs[pred[0]];
      if (!from) continue;
      edges.push({from, to:t, cross:isCrossPerson(from,t), type:pred[1]});
    }
  }
  h += '<div class="card"><h2>Что что блокирует</h2>';
  if (!edges.length) h += '<div class="muted">Нет зависимостей внутри/на вход.</div>';
  else {
    h += '<ul class="dep-list">';
    for (const e of edges){
      const mark = e.cross ? ' <b style="color:var(--dep)">handoff</b>' : '';
      h += '<li><b>'+e.from.wbs+'</b> '+esc(e.from._fio)+' <span class="arr" style="color:var(--dep)">затем</span> <b>'+e.to.wbs+'</b> '+esc(e.to._fio)+
        ' <span class="muted">('+fmt(e.from.finish)+' → '+fmt(e.to.start)+')</span>'+mark+'</li>';
    }
    h += '</ul>';
  }
  h += '</div>';

  // route list
  h += '<div class="card"><h2>Задачи доработки</h2><ol class="route">';
  let num=0;
  for (const t of tasks){
    num++;
    let dep='';
    if (t.preds && t.preds.length){
      dep = '<div class="rdep">ждёт: '+t.preds.map(p=>{
        const pr=byWbs[p[0]];
        return (pr?pr.wbs+' ('+pr._fio+')':p[0]);
      }).join(', ')+'</div>';
    }
    const suc = successors(t.wbs);
    let blk='';
    if (suc.length){
      blk = '<div class="rdep">блокирует: '+suc.map(s=>s.wbs+' ('+s._fio+')').join(', ')+'</div>';
    }
    h += '<li><div class="rnum" style="background:'+BC[b]+'">'+num+'</div>'+
      '<div class="rbody" style="border-left-color:'+BC[b]+'">'+
      '<div class="rtitle">'+esc(t.name)+'</div>'+
      '<div class="rmeta">'+esc(t._fio)+' · '+fmtY(t.start)+' — '+fmtY(t.finish)+' · '+t.work+' ч · WBS '+t.wbs+'</div>'+
      dep+blk+'</div></li>';
  }
  h += '</ol></div>';

  pan.innerHTML = h;
}

// ---- PERSON TABS ----
for (const k of PEOPLE_ORDER){
  const p = DATA.people[k];
  const id = 'p_'+k.replace(/\s/g,'_');
  addTab(id, p.fio.split(' ')[0]+(p.fio.split(' ')[1]?' '+p.fio.split(' ')[1][0]+'.':''), {row:'people'});

  h += '<div class="pinfo" style="margin-top:6px">Доработки: ';

  h += ' · задач: '+p.tasks.length+' · часов: '+p.tasks.reduce((s,t)=>s+t.work,0)+'</div>';

  // mini gantt for person
  h += deadlineLegendHtml(p.blocks);
  h += buildGantt([{key:k,label:esc(p.fio),sub:'',tasks:p.tasks}], {deadlines:p.blocks, id:'pg_'+id, barLabel:'block'});
  h += '<div class="note" style="margin-bottom:12px">Зависимости — в тексте ниже (на гантте стрелки не рисуются).</div>';

  let lastBlock=null, num=0;
  h += '<ol class="route">';
  for (const t of p.tasks){
    if (t.block!==lastBlock){
      h += '</ol><div class="blockhdr" style="background:'+BC[t.block]+'">'+esc(DATA.block_name[t.block])+'</div><ol class="route">';
      lastBlock = t.block;
    }
    num++;
    let dep='';
    if (t.ext && t.ext.length){
      dep = '<div class="rdep">ждёт: '+t.ext.map(e=>'задачу '+e.wbs+' ('+e.who+')').join(', ')+'</div>';
    } else if (t.preds && t.preds.length){
      const cross = t.preds.map(pr=>{
        const pred=byWbs[pr[0]];
        if (!pred || pred._fio===p.fio) return null;
        return pred.wbs+' ('+pred._fio+')';
      }).filter(Boolean);
      if (cross.length) dep = '<div class="rdep">ждёт: '+cross.join(', ')+'</div>';
    }
    const suc = successors(t.wbs).filter(s => s._fio !== p.fio);
    let blk='';
    if (suc.length) blk = '<div class="rdep">отдаёт дальше: '+suc.map(s=>s.wbs+' ('+s._fio+')').join(', ')+'</div>';
    h += '<li><div class="rnum" style="background:'+BC[t.block]+'">'+num+'</div>'+
      '<div class="rbody" style="border-left-color:'+BC[t.block]+'">'+
      '<div class="rtitle">'+esc(t.name)+'</div>'+
      '<div class="rmeta">'+fmtY(t.start)+' — '+fmtY(t.finish)+' · '+t.work+' ч · WBS '+t.wbs+'</div>'+dep+blk+'</div></li>';
  }
  h += '</ol></div>';
  pan.innerHTML = h;
}

// theme
const themeBtn = document.getElementById('themeBtn');
const themeMeta = document.querySelector('meta[name="theme-color"]');
function applyTheme(t){
  if (t==='dark'){ document.documentElement.setAttribute('data-theme','dark'); themeBtn.textContent='☀️ Светлая тема'; }
  else { document.documentElement.removeAttribute('data-theme'); themeBtn.textContent='🌙 Тёмная тема'; }
  if (themeMeta) themeMeta.setAttribute('content', t==='dark' ? '#15171C' : '#2F5496');
  try{ localStorage.setItem('vor_theme',t); }catch(e){}
}
themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
let saved=null;
try{ saved=localStorage.getItem('vor_theme'); }catch(e){}
if (saved) applyTheme(saved);
else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');

// tooltips: hover на десктопе; на таче тап по задаче закрепляет подсказку, тап мимо — закрывает
const tip = document.getElementById('tip');
let tipBar = null; // бар с закреплённой (тапом) подсказкой
function placeTip(x, y){
  // измеряем при left:8, иначе ширина fixed-блока зависит от прежнего left и клампится краем экрана
  tip.style.left = '8px'; tip.style.top = '0px';
  const w = tip.offsetWidth, h = tip.offsetHeight;
  let L = x + 14, T = y + 16;
  if (L + w > window.innerWidth - 8) L = window.innerWidth - w - 8;
  if (L < 8) L = 8;
  if (T + h > window.innerHeight - 8) T = y - h - 12;
  if (T < 8) T = 8;
  tip.style.left = L + 'px';
  tip.style.top = T + 'px';
}
function showTip(html, x, y){
  tip.innerHTML = html;
  tip.style.display = 'block';
  placeTip(x, y);
}
function hideTip(){
  tip.style.display = 'none';
  tipBar = null;
}
document.addEventListener('mouseover', e => {
  if (tipBar) return;
  const b = e.target.closest('.gbar');
  if (b) showTip(b.dataset.tip, e.clientX, e.clientY);
  else tip.style.display = 'none';
});
document.addEventListener('mousemove', e => {
  if (tipBar || tip.style.display !== 'block') return;
  placeTip(e.clientX, e.clientY);
});
document.addEventListener('click', e => {
  const b = e.target.closest('.gbar');
  if (b){
    if (tipBar === b){ hideTip(); return; }
    const r = b.getBoundingClientRect();
    showTip(b.dataset.tip, r.left, r.bottom + 4);
    tipBar = b;
  } else if (tipBar) hideTip();
});
document.addEventListener('scroll', () => { if (tipBar) hideTip(); }, true);

scrollGanttsToToday(document);
window.addEventListener('load', () => scrollGanttsToToday(document));
